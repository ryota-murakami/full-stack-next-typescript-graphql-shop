services:
  postgres:
    image: postgres:16-alpine
    container_name: fullstack-shop-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shopdev
      POSTGRES_DB: fullstack_shop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d fullstack_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
